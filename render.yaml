previews:
  generation: automatic

services:
  - type: web
    runtime: python
    name: carbon-credit-api
    region: singapore
    plan: starter
    healthCheckPath: /health
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python scripts/bootstrap_db.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEBUG
        value: "false"
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: carbon-credit-db
          property: connectionString
      - key: THINGSPEAK_BASE_URL
        value: https://api.thingspeak.com
      - key: THINGSPEAK_CHANNEL_ID
        sync: false
      - key: THINGSPEAK_READ_API_KEY
        sync: false
      - key: THINGSPEAK_TIMEOUT_SECONDS
        value: "15"
      - key: THINGSPEAK_SENSOR_ID
        value: THINGSPEAK-3313997
      - key: THINGSPEAK_DEFAULT_DEPTH_CM
        value: "10.0"
      - key: THINGSPEAK_IMPORT_RESULTS
        value: "5"

  - type: web
    runtime: static
    name: carbon-credit-web
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: carbon-credit-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: carbon-credit-db
    region: singapore
    plan: basic-256mb
    databaseName: carbon_credit_db
    user: carbon_app_user
